<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家常点单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">家庭厨房助手</p>
          <h1>家常点单</h1>
        </div>
        <button class="icon-button" id="openShoppingButton" type="button" aria-label="打开购物清单">
          🧺
          <span id="shoppingBadge" class="badge">0</span>
        </button>
      </header>

      <main>
        <section class="hero">
          <div class="hero-copy">
            <p>先选想吃的菜，再自动整理买菜清单和做法步骤。</p>
          </div>
          <div class="hero-plate" aria-hidden="true">
            <span>番茄</span>
            <strong>鸡蛋</strong>
            <em>青菜</em>
          </div>
        </section>

        <nav class="tabs" aria-label="主要页面">
          <button class="tab active" type="button" data-view="recipes">点菜</button>
          <button class="tab" type="button" data-view="menu">今日菜单 <span id="menuCount">0</span></button>
          <button class="tab" type="button" data-view="shopping">购物清单</button>
        </nav>

        <section id="recipesView" class="view active">
          <div class="search-row">
            <label class="search-box">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="输入菜名、食材或标签" />
            </label>
          </div>
          <div id="categoryChips" class="chips" aria-label="菜品分类"></div>
          <div id="recipeGrid" class="recipe-grid"></div>
        </section>

        <section id="menuView" class="view">
          <div class="section-heading">
            <div>
              <p class="eyebrow">今天准备做</p>
              <h2>今日菜单</h2>
            </div>
            <button class="primary-button" id="goShoppingButton" type="button">生成清单</button>
          </div>
          <div id="menuList" class="stack"></div>
        </section>

        <section id="shoppingView" class="view">
          <div class="section-heading">
            <div>
              <p class="eyebrow">买菜时勾选</p>
              <h2>购物清单</h2>
            </div>
            <button class="ghost-button" id="clearCheckedButton" type="button">清除已勾选</button>
          </div>
          <div id="shoppingSummary" class="shopping-summary"></div>
          <div id="shoppingList" class="shopping-list"></div>
        </section>
      </main>
    </div>

    <dialog id="recipeDialog" class="recipe-dialog">
      <div id="recipeDetail"></div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
