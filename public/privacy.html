<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <title>食间隐私政策</title>
    <style>
      body {
        margin: 0;
        background: #fafaf7;
        color: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      h1 {
        font-size: 40px;
        letter-spacing: -0.04em;
        margin: 0 0 16px;
      }

      section {
        margin-top: 18px;
        border: 1px solid #e6e2d8;
        border-radius: 24px;
        background: #ffffff;
        padding: 20px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      p,
      li {
        line-height: 1.8;
        color: rgba(17, 17, 17, 0.68);
      }

      a {
        color: #111111;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>食间隐私政策</h1>
      <p>更新日期：2026-06-04。本页面为食间自用 MVP 阶段隐私说明，后续接入微信登录或正式发布前会继续完善。</p>

      <section>
        <h2>我们收集什么</h2>
        <p>食间会在你主动使用时保存账号邮箱、家庭空间、家庭成员偏好、菜单计划、购物清单、厨房库存和晚饭推荐上下文。</p>
      </section>

      <section>
        <h2>数据如何使用</h2>
        <p>这些数据用于生成家庭饮食推荐、同步多端菜单、维护购物清单和展示家庭偏好。推荐服务在云端完成，密钥不会进入前端页面。</p>
      </section>

      <section>
        <h2>数据存储</h2>
        <p>未登录时数据保存在本地浏览器；登录后可同步到云端家庭空间。你可以退出登录继续本地体验。</p>
      </section>

      <section>
        <h2>联系我们</h2>
        <p>当前为个人自用 MVP。如需删除或更正数据，请通过项目维护者处理。</p>
        <p><a href="/family-menu/">返回食间</a></p>
      </section>
    </main>
