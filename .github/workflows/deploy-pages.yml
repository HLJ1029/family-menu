name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_HUMI_API_BASE_URL: ${{ vars.VITE_HUMI_API_BASE_URL }}
          VITE_HUMI_ASSET_BASE_URL: https://api.humi-home.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-2.outputs.page_url || steps.deployment-retry-3.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages retry 2
        id: deployment-retry-2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages retry 3
        id: deployment-retry-3
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Verify Pages deployment
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure' && steps.deployment-retry-3.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after 3 attempts."
          exit 1
